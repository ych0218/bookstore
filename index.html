<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1" />
    <title>카카오 페이지</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="./css/reset.css">
</head>

<body>
    <header>
        <div id="header_top">
            <div class="container">
                <div id="kakao"></div>
                <div id="search"></div>
            </div>

        </div>

        <div id="header_main">
            <div class="container">
                <div id="nav1"></div>
                <div id="nav2"></div>
                <div id="nav3"></div>
            </div>

        </div>

        <div id="header_bottom">
            <div id="right1"></div>
            <div id="left"></div>
            <div id="right2"></div>
        </div>
    </header>
    <div id="slider">
        <div class="swiper mySwiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide">
                    <img src="./img/resource.png" alt="">
                </div>
                <div class="swiper-slide">
                    <img src="./img/resource (1).png" alt="">
                </div>
                <div class="swiper-slide">
                    <img src="./img/resource (2).png" alt="">
                </div>
                <div class="swiper-slide">
                    <img src="./img/resource (3).png" alt="">
                </div>
            </div>
            <div class="swiper-button-next"></div>
            <div class="swiper-button-prev"></div>
            <div class="swiper-pagination"></div>
        </div>
    </div>

    <div class="boxWrap">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>

    <br>
    <br>
    <div class="h3"><h3>책</h3></div>
    <br>
    
    <div class="boxWrap2">
        <div class="box2"></div>
        <div class="box2"></div>
        <div class="box2"></div>
        <div class="box2"></div>
        <div class="box2"></div>
        <div class="box2"></div>
    </div>

    <br>
    <br>
    <div class="h3"><h3>책</h3></div>
    <br>

    <div id="slider2">
        <div class="swiper mySwiper2">
            <div class="swiper-wrapper">
                <div class="swiper-slide"></div>
                <div class="swiper-slide"></div>
                <div class="swiper-slide"></div>
                <div class="swiper-slide"></div>
                <div class="swiper-slide"></div>
                <div class="swiper-slide"></div>
                <div class="swiper-slide"></div>
                <div class="swiper-slide"></div>
                <div class="swiper-slide"></div>
                <div class="swiper-slide"></div>
            </div>
            <div class="swiper-button-next"></div>
            <div class="swiper-button-prev"></div>
        </div>
    </div>
    
     <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script src="./js/swiper.js"></script>
    <script src="./js/book.js"></script>
    <script src="./js/book2.js"></script>
    <script src="./js/book3.js"></script>
</body>

</html>
